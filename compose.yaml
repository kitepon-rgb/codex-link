services:
  relay:
    build:
      context: .
      dockerfile: services/relay/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PORT: "3000"
      CODEX_LINK_RELAY_URL: "http://127.0.0.1:3000"
      CODEX_LINK_HOST_BOOTSTRAP_TOKEN: "${CODEX_LINK_HOST_BOOTSTRAP_TOKEN:-codex-link-local-dev-bootstrap-token}"
      CODEX_LINK_EVENT_CACHE_LIMIT: "${CODEX_LINK_EVENT_CACHE_LIMIT:-200}"
      CODEX_LINK_AUDIT_EVENT_LIMIT: "${CODEX_LINK_AUDIT_EVENT_LIMIT:-1000}"
      CODEX_LINK_RATE_LIMIT_WINDOW_MS: "${CODEX_LINK_RATE_LIMIT_WINDOW_MS:-60000}"
      CODEX_LINK_RATE_LIMIT_MAX_REQUESTS: "${CODEX_LINK_RATE_LIMIT_MAX_REQUESTS:-120}"
      CODEX_LINK_MAX_HTTP_BODY_BYTES: "${CODEX_LINK_MAX_HTTP_BODY_BYTES:-65536}"
      CODEX_LINK_MAX_WEBSOCKET_PAYLOAD_BYTES: "${CODEX_LINK_MAX_WEBSOCKET_PAYLOAD_BYTES:-1048576}"
      CODEX_LINK_RELAY_STATE_PATH: "${CODEX_LINK_RELAY_STATE_PATH:-/data/relay-state.json}"
      CODEX_LINK_RELAY_STATE_FLUSH_INTERVAL_MS: "${CODEX_LINK_RELAY_STATE_FLUSH_INTERVAL_MS:-2000}"
    volumes:
      - relay-state:/data

volumes:
  relay-state:
